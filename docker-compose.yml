services:
  postgres:
    image: postgres:16
    container_name: wedding-mc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: weddingmc
    ports:
      - "5432:5432"
    volumes:
      - weddingmc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d weddingmc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  weddingmc-pgdata:
